<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarny Clone - Proyecto Juego</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto !important; }
        .ui-overlay { 
            position: fixed; top: 20px; left: 20px; 
            color: white; font-family: 'Segoe UI', system-ui, sans-serif; 
            background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px;
        }
        #status { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; font-weight: 800; }
        .id-container { 
            background: #0f172a; border-radius: 12px; padding: 10px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #334155; margin-bottom: 15px;
        }
        #my-id { font-family: monospace; font-weight: 900; color: #fbbf24; font-size: 1.2rem; }
        .copy-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; transition: 0.2s; padding: 0; }
        .copy-btn:hover { color: #fbbf24; transform: scale(1.1); }
        input { 
            background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; 
            margin-bottom: 10px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #ff4d4d; }
        .btn-connect { 
            cursor: pointer; padding: 12px; background: linear-gradient(135deg, #ff4d4d, #f43f5e); 
            border: none; color: white; border-radius: 8px; font-weight: 900; 
            width: 100%; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }

        /* Controles Mobile */
        #mobile-controls {
            position: fixed; bottom: 30px; left: 0; right: 0;
            display: none; justify-content: space-between; align-items: flex-end;
            padding: 0 40px; pointer-events: none; user-select: none; z-index: 10;
        }
        #joystick-base {
            width: 120px; height: 120px; background: rgba(255,255,255,0.1); 
            border-radius: 50%; position: relative; pointer-events: auto; touch-action: none;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            width: 50px; height: 50px; background: white; border-radius: 50%; 
            position: absolute; top: 35px; left: 35px; opacity: 0.5;
        }
        #jump-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); 
            border: 2px solid white; color: white; border-radius: 50%; 
            font-weight: 900; pointer-events: auto; touch-action: none; outline: none;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div id="status">🛰️ Iniciando red...</div>
        <div id="host-ui">
            <div class="id-container">
                <span id="my-id">...</span>
                <button class="copy-btn" onclick="copyId()" title="Copiar código">📋</button>
            </div>
        </div>
        <div id="join-ui">
            <input type="text" id="peer-id" placeholder="Código de tu amigo...">
            <button class="btn-connect" onclick="connectToPeer()">Conectar y Jugar</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>
        <button id="jump-btn">SALTAR</button>
    </div>

    <!-- Motor de física Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
